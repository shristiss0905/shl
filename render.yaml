services:
  - type: web
    name: shl-assessment-recommender
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: SHL_CATALOG_REFRESH_ON_STARTUP
        value: "true"
